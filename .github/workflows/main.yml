name: Run Selenium Tests and Generate Report (JS)
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  run-selenium:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm install
      - name: Run Selenium tests and generate report
        run: npx mocha --timeout 10000 --reporter mochawesome --reporter-options reportDir=mochawesome-report,reportFilename=index,quiet=true
      - name: Upload Mochawesome report
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report
          path: mochawesome-report
