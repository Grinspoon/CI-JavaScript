name: Run tests (Java)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build with Maven
        run: mvn -f Java/pom.xml clean compile

      - name: Run Java Test Classes
        run: |
          mkdir -p bin
          javac -d bin Java/src/main/java/githubActionsTest/*.java
          cd bin
          for class in $(ls githubActionsTest/*.class | sed 's/\.class$//' | sed 's/\//./g'); do
            echo "Running $class"
            # Run any main methods named 'main', otherwise just try running the class (will require main)
            java $class || true
          done