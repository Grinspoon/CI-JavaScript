name: JavaScript CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  run-javaScript-selenium-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm install
      - name: JavaScript Build & Test
        run: npx mocha JavaScript/*.js --timeout 30000 --reporter mochawesome
      - name: Upload Mochawesome report
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report
          path: mochawesome-report
